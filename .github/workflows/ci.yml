# Pipeline CI — kraak-group monorepo
# Déclenché sur push vers main et sur les pull requests ciblant main.
# Couvre : format, lint, build, tests unitaires, tests E2E.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Vérifications rapides : format + lint
  # ──────────────────────────────────────────────
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Vérifier le formatage (Prettier)
        run: pnpm format:check

      - name: Lint (ESLint)
        run: pnpm lint

  # ──────────────────────────────────────────────
  # Build de production (web + mobile)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web (production SSR)
        run: pnpm build:web

      - name: Build mobile (production)
        run: pnpm build:mobile

  # ──────────────────────────────────────────────
  # Tests unitaires (Vitest via Angular builder)
  # ──────────────────────────────────────────────
  unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Exécuter les tests unitaires
        run: pnpm test:unit

  # ──────────────────────────────────────────────
  # Validation Docker (build de l'image API)
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Construire l'image Docker API
        run: docker build -f apps/api/Dockerfile -t kraak-api:ci .

  # ──────────────────────────────────────────────
  # Tests E2E (Playwright — Chromium)
  # ──────────────────────────────────────────────
  e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Installer les navigateurs Playwright
        run: pnpm --filter @kraak/client exec playwright install --with-deps chromium

      - name: Exécuter les tests E2E
        run: pnpm test:e2e

      - name: Sauvegarder les rapports Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/client/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Build debug APK Android (Capacitor + Gradle)
  # ──────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: pnpm install --frozen-lockfile

      - name: Build mobile & sync Android
        run: |
          pnpm build:mobile
          cd apps/client && npx cap add android && npx cap sync android

      - name: Build debug APK
        working-directory: apps/client/android
        run: ./gradlew assembleDebug

      - name: Sauvegarder le debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: apps/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
