<p-card class="shadow-card block h-full" [style]="{ height: '100%' }">
  <ng-template #content>
    <div class="flex h-full flex-col">
      @if (icon) {
        <div
          class="text-secondary mb-4 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-neutral-50 text-xl"
        >
          <i [class]="icon"></i>
        </div>
      }
      <ng-content select="[cardHeader]" />
      @if (title) {
        <h3 class="text-primary text-xl font-semibold">{{ title }}</h3>
      }
      @if (description) {
        <p class="mt-3 text-sm leading-7 text-neutral-700">{{ description }}</p>
      }
      <ng-content />
      @if (link && linkLabel) {
        <div class="mt-auto pt-5">
          <a
            pButton
            [routerLink]="link"
            [label]="linkLabel"
            [attr.aria-label]="linkLabel"
            icon="pi pi-arrow-right"
            iconPos="right"
            [text]="true"
            severity="secondary"
            class="kr-link-button -ml-3 text-sm"
          ></a>
        </div>
      }
    </div>
  </ng-template>
</p-card>
