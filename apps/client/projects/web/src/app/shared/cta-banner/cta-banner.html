<aside class="py-16 lg:py-24">
  <div class="mx-auto w-full max-w-6xl px-4 lg:px-6">
    <p-card
      class="shadow-card block"
      [style]="{
        background: 'var(--kr-brand-navy)',
        color: 'var(--kr-brand-white)',
        border: 'none',
      }"
    >
      <ng-template #content>
        <div class="px-2 py-2 sm:px-4 lg:px-6">
          <h2
            class="text-brand-white max-w-3xl text-3xl font-semibold text-balance lg:text-4xl"
          >
            {{ heading }}
          </h2>
          @if (body) {
            <p
              class="text-brand-white/80 mt-4 max-w-2xl text-base leading-7 text-balance"
            >
              {{ body }}
            </p>
          }
          <ng-content />
          @if (ctaLabel && ctaLink) {
            <a
              pButton
              [routerLink]="ctaLink"
              [label]="ctaLabel"
              [attr.aria-label]="ctaLabel"
              class="mt-8 text-sm"
              severity="contrast"
            ></a>
          }
        </div>
      </ng-template>
    </p-card>
  </div>
</aside>
