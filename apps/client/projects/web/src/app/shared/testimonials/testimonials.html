<div>
  @if (items.length > 0) {
    <div class="grid gap-6 lg:grid-cols-3">
      @for (item of items; track item.author) {
        <blockquote
          class="bg-brand-white shadow-card rounded-(--kr-radius-card) p-6"
        >
          <p class="text-base leading-7 text-neutral-800">
            &laquo; {{ item.quote }} &raquo;
          </p>
          <footer class="mt-6 flex flex-col gap-1">
            <strong class="text-primary text-sm font-semibold">{{
              item.author
            }}</strong>
            @if (item.role) {
              <span class="text-sm text-neutral-600">{{ item.role }}</span>
            }
          </footer>
        </blockquote>
      }
    </div>
  } @else if (placeholder) {
    <div
      class="rounded-(--kr-radius-card) border border-dashed border-neutral-300 bg-neutral-50 p-6 text-center"
    >
      <p class="text-sm leading-7 text-neutral-600">
        Témoignages à venir - nos participants partagent bientôt leurs
        expériences.
      </p>
    </div>
  }
</div>
