<header
  class="bg-brand-white/95 sticky top-0 z-50 border-b border-neutral-200 backdrop-blur-sm"
>
  <nav
    class="mx-auto flex w-full max-w-6xl items-center justify-between gap-4 px-4 py-4 lg:px-6"
  >
    <a
      routerLink="/"
      class="text-primary hover:text-secondary text-xl font-semibold tracking-[0.18em] transition-colors"
      (click)="closeMobileMenu()"
    >
      <span>KRAAK</span>
    </a>

    <ul class="hidden items-center gap-6 lg:flex">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="text-primary after:scale-x-100"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="hover:text-primary after:bg-secondary relative inline-flex items-center py-2 text-sm font-medium text-neutral-700 transition-colors after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:origin-left after:scale-x-0 after:transition-transform after:duration-200"
          >
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <div class="hidden lg:block">
      <a
        pButton
        routerLink="/contact"
        label="Nous contacter"
        aria-label="Nous contacter"
        size="small"
        class="text-sm"
      ></a>
    </div>

    <button
      pButton
      type="button"
      [outlined]="true"
      severity="secondary"
      [icon]="mobileMenuOpen() ? 'pi pi-times' : 'pi pi-bars'"
      class="lg:hidden"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-label="Menu de navigation"
    ></button>
  </nav>

  @if (mobileMenuOpen()) {
    <div
      class="bg-brand-white border-t border-neutral-200 px-4 py-4 shadow-sm lg:hidden"
    >
      <div class="mx-auto flex w-full max-w-6xl flex-col gap-4">
        <ul class="flex flex-col gap-2">
          @for (link of links; track link.path) {
            <li>
              <a
                [routerLink]="link.path"
                routerLinkActive="border-primary bg-neutral-50 text-primary"
                [routerLinkActiveOptions]="{ exact: link.path === '/' }"
                class="hover:text-primary block rounded-(--kr-radius-btn) border border-transparent px-4 py-3 text-sm font-medium text-neutral-700 transition-colors hover:border-neutral-200 hover:bg-neutral-50"
                (click)="closeMobileMenu()"
              >
                {{ link.label }}
              </a>
            </li>
          }
        </ul>
        <a
          pButton
          routerLink="/contact"
          label="Nous contacter"
          aria-label="Nous contacter"
          [fluid]="true"
          (click)="closeMobileMenu()"
        ></a>
      </div>
    </div>
  }
</header>
