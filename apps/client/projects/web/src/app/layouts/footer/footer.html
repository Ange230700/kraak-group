<footer class="mt-16 border-t border-neutral-200 bg-neutral-50">
  <div
    class="mx-auto grid w-full max-w-6xl gap-10 px-4 py-12 lg:grid-cols-[1.3fr_1.7fr] lg:px-6"
  >
    <div class="space-y-4">
      <span class="block text-xl font-semibold tracking-[0.18em] text-primary"
        >KRAAK</span
      >
      <p class="max-w-md text-sm leading-7 text-neutral-700">
        Accompagner l'ambition. Former le leadership. Ouvrir les chemins.
      </p>
    </div>
    <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
      @for (group of linkGroups; track group.title) {
        <div class="space-y-3">
          <h3
            class="text-sm font-semibold uppercase tracking-[0.14em] text-primary"
          >
            {{ group.title }}
          </h3>
          <ul class="space-y-2">
            @for (link of group.links; track link.path + link.label) {
              <li>
                <a
                  [routerLink]="link.path"
                  class="text-sm text-neutral-700 transition-colors hover:text-secondary hover:underline"
                >
                  {{ link.label }}
                </a>
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
  <div class="border-t border-neutral-200 bg-brand-white/70">
    <div class="mx-auto w-full max-w-6xl px-4 py-4 lg:px-6">
      <p class="text-xs text-neutral-600">
        &copy; {{ currentYear }} KRAAK. Tous droits réservés.
      </p>
    </div>
  </div>
</footer>
