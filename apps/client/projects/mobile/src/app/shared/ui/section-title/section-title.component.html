<div class="space-y-2">
  @if (overline) {
    <p class="text-secondary text-xs font-semibold tracking-[0.24em] uppercase">
      {{ overline }}
    </p>
  }

  <h2 class="text-primary text-2xl font-semibold">
    {{ title }}
  </h2>

  @if (subtitle) {
    <p class="text-sm leading-6 text-neutral-700">
      {{ subtitle }}
    </p>
  }
</div>
