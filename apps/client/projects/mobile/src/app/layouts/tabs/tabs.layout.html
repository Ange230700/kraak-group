<ion-tabs>
  <ion-router-outlet></ion-router-outlet>

  <ion-tab-bar slot="bottom" class="kraak-tab-bar">
    @for (tab of tabs; track tab.href) {
      <ion-tab-button
        [tab]="tab.tab"
        [href]="tab.href"
        class="kraak-tab-button"
      >
        <ion-icon [name]="tab.icon"></ion-icon>
        <ion-label>{{ tab.label }}</ion-label>
      </ion-tab-button>
    }
  </ion-tab-bar>
</ion-tabs>
