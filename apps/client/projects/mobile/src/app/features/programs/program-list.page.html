<kraak-page-shell
  eyebrow="Accompagnement"
  title="Programmes"
  description="Retrouvez les parcours KRAAK et ouvrez un détail dans la stack."
>
  <section
    class="rounded-card border-brand-blue/12 bg-brand-white shadow-card flex flex-col gap-4 border p-5"
  >
    <p class="text-sm leading-6 text-neutral-700">
      Explorez les parcours actifs puis ouvrez leurs ressources ou leurs
      sessions sans quitter l'onglet Programmes.
    </p>

    <ion-button
      routerLink="/tabs/programmes/demo"
      expand="block"
      class="kraak-primary-button"
    >
      Ouvrir un programme exemple
    </ion-button>

    <a routerLink="/tabs/programmes/ressources" class="kraak-inline-link">
      Voir la bibliothèque de ressources
    </a>
  </section>
</kraak-page-shell>
