project_id = "kraak-group"

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = [
  "http://localhost:4200/auth/callback",
  "http://localhost:4200/auth/reset",
  "http://localhost:4300/auth/callback",
  "http://localhost:4300/auth/reset",
  "https://client-six-indol-58.vercel.app/auth/callback",
  "https://client-six-indol-58.vercel.app/auth/reset",
  "https://kraak-group.vercel.app/auth/callback",
  "https://kraak-group.vercel.app/auth/reset",
  "kraak://auth/callback",
  "kraak://auth/reset",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m"

[auth.email.template.confirmation]
subject = "Confirmez votre inscription KRAAK"
content_path = "./supabase/templates/auth/confirmation.html"

[auth.email.template.recovery]
subject = "Réinitialisez votre mot de passe KRAAK"
content_path = "./supabase/templates/auth/recovery.html"
